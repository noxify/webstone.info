<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webstone</title>
    <style>
      :root {
        --text: #111827;
        --muted: #374151;
        --bg: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #eef2ff, var(--bg) 60%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, 92vw);
        text-align: center;
        padding: 2rem 1.25rem;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }

      .brand img {
        width: 72px;
        height: auto;
      }

      h1 {
        margin: 0;
        line-height: 1;
        font-size: clamp(2rem, 4vw, 2.5rem);
      }

      p {
        margin: 2.75rem auto 0;
        max-width: 52ch;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="./assets/ws-logo.png" alt="webstone logo" />
        <h1>webstone</h1>
      </div>
      <p>
        Welcome to webstone. Here you will soon find the documentation for my
        private projects.
      </p>
    </main>
  </body>
</html>
